name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/lambdas/ingester/requirements.txt
          pip install -r infrastructure/lambdas/consumer/requirements.txt
          pip install moto boto3 black flake8

      - name: Format Python code
        run: |
          black infrastructure/lambdas/
          black tests/

      - name: Lint Python code
        run: |
          flake8 infrastructure/lambdas/ --max-line-length=120
          flake8 tests/ --max-line-length=120

      - name: Run consumer tests
        run: |
          python -m unittest tests.consumer-lambda-suite -v
        env:
          AWS_DEFAULT_REGION: us-east-1

      - name: Run ingester tests
        run: |
          python -m unittest tests.ingester-lambda-suite -v
        env:
          AWS_DEFAULT_REGION: us-east-1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Build TypeScript
        working-directory: infrastructure
        run: npm run build

      - name: CDK Synth
        working-directory: infrastructure
        run: npm run synth
