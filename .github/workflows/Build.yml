name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/lambdas/ingester/requirements.txt
          pip install -r infrastructure/lambdas/consumer/requirements.txt
          pip install moto boto3 black flake8

      - name: Format Python code
        run: |
          black infrastructure/lambdas/
          black tests/

      - name: Lint Python code
        run: |
          flake8 infrastructure/lambdas/ --max-line-length=120
          flake8 tests/ --max-line-length=120

      - name: Run consumer tests
        run: |
          python -m unittest tests.consumer-lambda-suite -v
        env:
          AWS_DEFAULT_REGION: us-east-1

      - name: Run ingester tests
        run: |
          python -m unittest tests.ingester-lambda-suite -v
        env:
          AWS_DEFAULT_REGION: us-east-1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Build TypeScript
        working-directory: infrastructure
        run: npm run build

      - name: CDK Synth
        working-directory: infrastructure
        run: npm run synth

      - name: CDK Diff
        if: github.event_name == 'pull_request'
        working-directory: infrastructure
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          npx cdk diff --all --context stage=dev --context region=us-east-1 > diff-output.txt 2>&1 || true

      - name: Comment PR with CDK Diff
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diffOutput = fs.readFileSync('infrastructure/diff-output.txt', 'utf8');

            const body = `## 🔍 CDK Infrastructure Changes

            <details>
            <summary>Click to see infrastructure diff</summary>

            \`\`\`diff
            ${diffOutput}
            \`\`\`

            </details>

            ---
            *This comment shows the infrastructure changes that will be deployed when this PR is merged.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
