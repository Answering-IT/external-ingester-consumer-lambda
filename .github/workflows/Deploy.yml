name: Deploy to Dev

on:
  push:
    branches:
      - main

env:
  STAGE: dev
  REGION: us-east-1
  AWS_ACCOUNT: '708819485463'

jobs:
  deploy-dev:
    name: Deploy to Dev (us-east-1)
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/lambdas/ingester/requirements.txt
          pip install -r infrastructure/lambdas/consumer/requirements.txt
          pip install black

      - name: Format Python code
        run: |
          black infrastructure/lambdas/
          black tests/

      - name: Run tests
        run: |
          pip install moto boto3
          python -m unittest discover -s tests -p "*-suite.py" -v

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Build TypeScript
        working-directory: infrastructure
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: CDK Synth
        working-directory: infrastructure
        run: npm run synth

      - name: CDK Deploy
        working-directory: infrastructure
        run: |
          npx cdk deploy --all \
            --context stage=${{ env.STAGE }} \
            --context region=${{ env.REGION }} \
            --require-approval never

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed"
          echo "Stage: ${{ env.STAGE }}"
          echo "Region: ${{ env.REGION }}"
          echo "Account: ${{ env.AWS_ACCOUNT }}"
