name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.set-env.outputs.stage }}
      region: ${{ steps.set-env.outputs.region }}
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Determine environment from tag
        id: set-env
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Tag: $TAG"

          if [[ "$TAG" =~ -rc[0-9]+$ ]]; then
            echo "stage=stg" >> $GITHUB_OUTPUT
            echo "region=us-east-1" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "🔶 Deploying to STAGING (us-east-1)"
          else
            echo "stage=prod" >> $GITHUB_OUTPUT
            echo "region=us-east-2" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "🚀 Deploying to PRODUCTION (us-east-2)"
          fi

  deploy:
    name: Deploy to ${{ needs.determine-environment.outputs.stage }}
    runs-on: ubuntu-latest
    needs: determine-environment
    environment: ${{ needs.determine-environment.outputs.environment }}

    env:
      STAGE: ${{ needs.determine-environment.outputs.stage }}
      REGION: ${{ needs.determine-environment.outputs.region }}
      AWS_ACCOUNT: '708819485463'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying version: $TAG"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infrastructure/lambdas/ingester/requirements.txt
          pip install -r infrastructure/lambdas/consumer/requirements.txt
          pip install black

      - name: Format Python code
        run: |
          black infrastructure/lambdas/
          black tests/

      - name: Run tests
        run: |
          pip install moto boto3
          python -m unittest tests.consumer-lambda-suite -v && python -m unittest tests.ingester-lambda-suite -v
        env:
          AWS_DEFAULT_REGION: us-east-1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Build TypeScript
        working-directory: infrastructure
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::708819485463:role/GitHubActions-Answering-IT-SharedRole
          aws-region: ${{ env.REGION }}

      - name: CDK Synth
        working-directory: infrastructure
        run: npm run synth

      - name: CDK Deploy
        working-directory: infrastructure
        run: |
          npx cdk deploy --all \
            --context stage=${{ env.STAGE }} \
            --context region=${{ env.REGION }} \
            --require-approval never

      - name: Deployment Summary
        run: |
          echo "### 🎉 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Stage**: ${{ env.STAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Account**: ${{ env.AWS_ACCOUNT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
