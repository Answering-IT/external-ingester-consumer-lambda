name: Rollback

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Production version to rollback to (e.g., v1.0.0) - WITHOUT -rc suffix'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  validate-rollback:
    name: Validate Production Rollback
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # Check if tag exists
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "❌ ERROR: Tag $VERSION does not exist"
            echo ""
            echo "Available production tags (without -rc):"
            git tag --sort=-version:refname | grep -v "\-rc" | head -10
            exit 1
          fi

          echo "✅ Tag $VERSION exists"

          # Production can ONLY use release tags (without -rc suffix)
          if [[ "$VERSION" =~ -rc[0-9]+$ ]]; then
            echo "❌ ERROR: Cannot rollback production to release candidate: $VERSION"
            echo ""
            echo "Production can only rollback to release tags WITHOUT -rc suffix"
            echo ""
            echo "Examples of valid production tags:"
            echo "  ✅ v1.0.0"
            echo "  ✅ v1.2.3"
            echo ""
            echo "Examples of INVALID production tags:"
            echo "  ❌ v1.0.0-rc1 (staging tag)"
            echo "  ❌ v1.2.3-rc5 (staging tag)"
            echo ""
            echo "Available production tags:"
            git tag --sort=-version:refname | grep -v "\-rc" | head -10
            exit 1
          fi

          echo "✅ Rollback validation passed"
          echo "Version: $VERSION"
          echo "Environment: Production (us-east-2)"

  confirm-rollback:
    name: Confirm Production Rollback
    runs-on: ubuntu-latest
    needs: validate-rollback
    environment: production-rollback

    steps:
      - name: Rollback confirmation
        run: |
          echo "🔄 Rolling back PRODUCTION to ${{ github.event.inputs.version }}"
          echo "Region: us-east-2"
          echo "Stage: prod"

  rollback:
    name: Rollback Production to ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    needs: [validate-rollback, confirm-rollback]
    environment: production

    env:
      STAGE: prod
      REGION: us-east-2
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Checkout version to rollback
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}
          fetch-depth: 0

      - name: Show rollback details
        run: |
          echo "### 🔄 Production Rollback Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: us-east-2" >> $GITHUB_STEP_SUMMARY
          echo "- **Stage**: prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit Message:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git log -1 --pretty=%B >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Build TypeScript
        working-directory: infrastructure
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::708819485463:role/GitHubActions-Answering-IT-SharedRole
          aws-region: ${{ env.REGION }}

      - name: CDK Synth
        working-directory: infrastructure
        run: npm run synth

      - name: CDK Deploy (Rollback Production)
        working-directory: infrastructure
        run: |
          echo "🔄 Deploying version ${{ env.VERSION }} to PRODUCTION (us-east-2)"
          npx cdk deploy --all \
            --context stage=prod \
            --context region=us-east-2 \
            --require-approval never

      - name: Rollback Summary
        run: |
          echo "### ✅ Production Rollback Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Successfully rolled back **PRODUCTION** to version **${{ env.VERSION }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: us-east-2" >> $GITHUB_STEP_SUMMARY
          echo "- **Stage**: prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ Verify the rollback in production" >> $GITHUB_STEP_SUMMARY
          echo "2. 🔍 Investigate the issue that caused the rollback" >> $GITHUB_STEP_SUMMARY
          echo "3. 🛠️ Create a fix and deploy a new version" >> $GITHUB_STEP_SUMMARY
          echo "4. 📝 Document the incident and lessons learned" >> $GITHUB_STEP_SUMMARY
